{% extends 'base.html' %}

{% block content %}

<h2>Welcome to Job Portal</h2>

{% if user.is_authenticated %}

    <p>Welcome, {{ user.username }} 👋</p>

    <a href="/jobs/"><button>View Jobs</button></a>
    <a href="/jobs/create/"><button>Post Job</button></a>
    <a href="/applications/my/"><button>My Applications</button></a>

{% else %}

    <p>If you don’t have an account, please register.</p>
    <a href="/register/"><button>Register</button></a>

    <br><br>

    <p>If you already have an account, please login.</p>
    <a href="/login/"><button>Login</button></a>

{% endif %}

{% endblock %}
