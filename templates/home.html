{% extends 'base.html' %}

{% block content %}

<h2>Welcome to Job Portal</h2>

{% if user.is_authenticated %}

    <p>Welcome, {{ user.username }} 👋</p>

    <a href="{% url 'job_list' %}"><button>View Jobs</button></a>
    <a href="{% url 'create_job' %}"><button>Post Job</button></a>
    <a href="{% url 'my_applications' %}"><button>My Applications</button></a>
    <a href="/logout/"><button>Logout</button></a>

{% else %}

    <p>If you don’t have an account, please register.</p>
    <a href="{% url 'register' %}"><button>Register</button></a>

    <p>If you already have an account, please login.</p>
    <a href="{% url 'login' %}"><button>Login</button></a>

{% endif %}

{% endblock %}
