{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-8">
    <div class="d-flex align-items-end justify-content-between gap-3 mb-3">
      <div>
        <h1 class="fw-bold mb-1">Send Message</h1>
        <p class="text-muted mb-0">To <strong>{{ recipient.get_full_name|default:recipient.username }}</strong></p>
      </div>
      <a href="{% url 'inbox' %}" class="btn btn-outline-secondary">Back to Inbox</a>
    </div>

    <div class="card shadow-sm">
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Send</button>
            <a class="btn btn-outline-secondary" href="{% url 'talent_list' %}">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
