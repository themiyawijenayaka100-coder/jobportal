{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-8">
    <div class="d-flex align-items-end justify-content-between gap-3 mb-3">
      <div>
        <h1 class="fw-bold mb-1">My Profile</h1>
        <p class="text-muted mb-0">Keep your details up to date.</p>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-body">
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-gradient-primary rounded-pill px-4">Save changes</button>
            <a href="{% url 'profile_detail' user.id %}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
