{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card shadow-sm border-danger">
      <div class="card-header bg-danger text-white">
        <h3 class="mb-0">Delete Job</h3>
      </div>
      <div class="card-body">
        <p class="mb-2">
          Are you sure you want to permanently delete this job posting?
        </p>
        <div class="alert alert-warning mb-4">
          <div class="fw-semibold">{{ job.title }}</div>
          <div class="text-muted">{{ job.company }}</div>
        </div>

        <form method="POST">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">Yes, delete</button>
            <a href="{% url 'edit_job' job.id %}" class="btn btn-outline-secondary">Cancel</a>
            <a href="{% url 'employer_dashboard' %}" class="btn btn-link ms-auto">Back to dashboard</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
