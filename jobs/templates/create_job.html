{% extends 'base.html' %}

{% block content %}

<h2>Create Job</h2>

<form method="POST">
    {% csrf_token %}

    {% if form and form.errors %}
        <div style="color: red;">{{ form.errors }}</div>
    {% endif %}

    <input type="text" name="title" placeholder="Job Title"><br><br>
    <input type="text" name="company" placeholder="Company"><br><br>
    <textarea name="description" placeholder="Description"></textarea><br><br>

    <button type="submit">Post Job</button>
</form>

{% endblock %}
