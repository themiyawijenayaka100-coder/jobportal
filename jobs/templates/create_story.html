{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-8">
    <div class="d-flex flex-wrap justify-content-between align-items-end gap-3 mb-3">
      <div>
        <h1 class="fw-bold mb-1">Share a Story</h1>
        <p class="text-muted mb-0">Post a short story to help others learn and connect.</p>
      </div>
      <a class="btn btn-outline-secondary" href="{% url 'story_list' %}">Back to Stories</a>
    </div>

    <div class="card shadow-sm">
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-gradient-primary rounded-pill px-4">Post Story</button>
            <a class="btn btn-outline-secondary rounded-pill px-4" href="{% url 'story_list' %}">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
