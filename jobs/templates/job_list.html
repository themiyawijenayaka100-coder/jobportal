{% extends 'base.html' %}

{% block content %}

<h2>Job List</h2>

{% for job in jobs %}
    <div style="border:1px solid black; padding:10px; margin:10px;">
        <h3>{{ job.title }}</h3>
        <p><b>Company:</b> {{ job.company }}</p>
        <p>{{ job.description }}</p>

        <a href="/applications/apply/{{ job.id }}/">
            <button>Apply</button>
        </a>
    </div>
{% endfor %}

{% endblock %}
