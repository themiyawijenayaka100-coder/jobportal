{% extends 'base.html' %}

{% block content %}
<div class="card shadow-sm mt-4">
    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
        <h4 class="mb-0">Applicants for: {{ job.title }}</h4>
        <a href="{% url 'employer_dashboard' %}" class="btn btn-sm btn-outline-light">← Back to Dashboard</a>
    </div>
    <div class="card-body">
        {% for app in applications %}
            <div class="border p-3 mb-3 rounded bg-light">
                <p><b>Candidate:</b> {{ app.user.username }}</p>
                <p><b>Status:</b> <span class="badge bg-secondary">{{ app.status }}</span></p>
                
                <form method="POST" class="d-flex align-items-center gap-2">
                    {% csrf_token %}
                    <input type="hidden" name="application_id" value="{{ app.id }}">
                    <select name="status" class="form-select w-auto">
                        <option value="Pending" {% if app.status == 'Pending' %}selected{% endif %}>Pending</option>
                        <option value="Accepted" {% if app.status == 'Accepted' %}selected{% endif %}>Accepted</option>
                        <option value="Rejected" {% if app.status == 'Rejected' %}selected{% endif %}>Rejected</option>
                    </select>
                    <button type="submit" class="btn btn-primary btn-sm">Update Status</button>
                </form>
            </div>
        {% empty %}
            <p class="text-muted">No candidates have applied yet.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
